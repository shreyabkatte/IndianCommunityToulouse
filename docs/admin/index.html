<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indian Community Toulouse CMS</title>
  <style>
    body { font-family: sans-serif; margin:0; padding:0; }
    h1 { text-align:center; margin-top:2rem; }
  </style>
</head>
<body>
  <h1>Loading CMS...</h1>

  <!-- Netlify CMS mounts here -->
  <div id="nc-root"></div>

  <!-- Official Netlify CMS script from CDN for GitHub backend support -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

        media_folder: 'img/uploads',
        public_folder: '/img/uploads',
        collections: [
          {
            name: 'home',
            label: 'Home Page',
            files: [
              {
                file: 'content/home.md',
                label: 'Home Content',

        ]
      }
    });

</html>

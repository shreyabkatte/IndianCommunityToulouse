<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indian Community Toulouse CMS</title>
  <!-- Decap CMS from CDN -->
  <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
  <style>
    body { font-family: sans-serif; margin: 0; padding: 0; }
    h1 { text-align: center; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Loading CMS...</h1>

  <script>
    CMS.init({
      config: {
        backend: {
          // Git Gateway backend (pre-authorized via token)
          name: 'git-gateway',
          branch: 'master',  // your default branch
          auth_token: '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'  // <-- REPLACE this with your token from Netlify
        },
        media_folder: 'images/uploads', // folder where uploaded images are stored
        public_folder: '/images/uploads',
        collections: [
          // Homepage content
          {
            name: 'home',
            label: 'Home Page',
            files: [
              {
                file: 'content/home.md', // file editable via CMS
                label: 'Home Content',
                name: 'home',
                fields: [
                  { label: 'Title', name: 'title', widget: 'string' },
                  { label: 'Main Text', name: 'body', widget: 'markdown' }
                ]
              }
            ]
          },
          // Example: Events list
          {
            name: 'events',
            label: 'Events',
            folder: 'content/events', // create this folder in /public/content/
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: 'Event Title', name: 'title', widget: 'string' },
              { label: 'Event Date', name: 'date', widget: 'datetime' },
              { label: 'Event Description', name: 'description', widget: 'markdown' }
            ]
          },
          // Example: Gallery
          {
            name: 'gallery',
            label: 'Gallery',
            folder: 'content/gallery', // create this folder in /public/content/
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: 'Image', name: 'image', widget: 'image' },
              { label: 'Caption', name: 'caption', widget: 'string' }
            ]
          },
          // Example: Announcements
          {
            name: 'announcements',
            label: 'Announcements',
            folder: 'content/announcements', // create this folder in /public/content/
            create: true,
            slug: "{{slug}}",
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Message', name: 'message', widget: 'markdown' },
              { label: 'Date', name: 'date', widget: 'datetime' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Indian Community Toulouse CMS</title>
  <!-- Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^2.0.0/dist/decap-cms.js"></script>
  <style>
    body { font-family: sans-serif; margin:0; padding:0; }
    h1 { text-align:center; margin-top:2rem; }
  </style>
</head>
<body>
  <h1>Loading CMS...</h1>

  <script>
    // Initialize CMS after script loads
    window.addEventListener('load', function() {
      CMS.init({
        config: {
          backend: {
            name: 'git-gateway',
            branch: 'main'  // your default branch
          },
          media_folder: 'images/uploads',
          public_folder: '/images/uploads',
          collections: [
            {
              name: 'home',
              label: 'Home Page',
              files: [
                {
                  file: 'content/home.md',
                  label: 'Home Content',
                  name: 'home',
                  fields: [
                    { label: 'Title', name: 'title', widget: 'string' },
                    { label: 'Main Text', name: 'body', widget: 'markdown' }
                  ]
                }
              ]
            }
          ]
        }
      });
    });
  </script>
</body>
</html>
